<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3912711241359030"
     crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #10B981;
            --secondary-hover: #059669;
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #1e293b;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        header h2 { font-weight: 700; letter-spacing: -0.5px; }
        
        nav a {
            color: #e2e8f0;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        nav a:hover { color: #fff; }

        @media(max-width: 600px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 20px 15px;
            }
            nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 15px;
            }
            nav a {
                margin-left: 0;
                font-size: 0.95rem;
            }
        }

        .hero { text-align: center; color: #fff; padding: 40px 20px 20px; }
        .hero h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .hero p { color: #94a3b8; font-size: 1.1rem; }

        .container {
            background: var(--card-bg);
            width: 95%;
            max-width: 900px;
            margin: 0 auto 40px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media(max-width: 768px) { 
            .grid { grid-template-columns: 1fr; gap: 30px; } 
            .container { padding: 25px 20px; } /* Menos padding en móviles para ganar espacio */
        }

        .form-group { margin-bottom: 20px; }
        
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        input:not([type="color"]), select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            background: #f9fafb;
        }

        textarea { resize: vertical; }

        input:not([type="color"]):focus, select:focus, textarea:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        input[type="color"] {
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            padding: 0;
            background: transparent;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s, opacity 0.3s;
        }

        button:active { transform: scale(0.98); }

        .btn-main { background: var(--primary); color: #fff; margin-bottom: 10px; }
        .btn-main:hover:not(:disabled) { background: var(--primary-hover); }

        .btn-download { background: var(--secondary); color: #fff; margin-top: 0; }
        .btn-download:hover { background: var(--secondary-hover); }
        
        .download-settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 10px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        /* AJUSTES IMPORTANTES PARA EL VISOR DEL QR */
        .qr-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 20px;
            padding: 30px 20px; /* Ajustado el padding */
            border: 2px dashed #cbd5e1;
            /* Eliminado min-height: 350px que causaba problemas en móvil */
            height: fit-content; /* Se adapta a su contenido */
            margin-top: 20px; /* Separación en vista móvil */
        }
        
        @media(min-width: 769px) {
            .qr-wrapper {
                margin-top: 0; /* Quita el margen en PC */
                min-height: 100%; /* Ocupa el alto disponible en la grilla */
            }
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            max-width: 100%; /* Asegura que no se desborde */
            overflow: hidden; /* Oculta cualquier desbordamiento interno */
        }

        #qrcode img, #qrcode canvas { 
            display: block; 
            margin: 0 auto; 
            max-width: 100%; /* El QR se achica si la pantalla es muy pequeña */
            height: auto !important; /* Mantiene la proporción */
        }

        #preview {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            word-break: break-all; /* CRÍTICO: Rompe textos largos (URLs) para que no rompan el ancho */
            max-width: 100%;
            padding: 0 10px;
        }

        footer { margin-top: auto; padding: 20px; text-align: center; color: #94a3b8; font-size: 0.9rem; }
        .placeholder-text { color: #94a3b8; font-weight: 500; text-align: center; }
    </style>
</head>
<body>

<header>
    <h2>QR PRO</h2>
    <nav>
        <a href="index.html">Generador</a>
        <a href="lector.html">Lector QR</a>
        <a href="compresor.html">Compresor</a>
    </nav>
</header>

<div class="hero">
    <h1>Crea tu código QR</h1>
    <p>Rápido, gratis y sin registro 🔒</p>
</div>

<div class="container">
    <div class="grid">
        <div>
            <div class="form-group">
                <label>¿Qué deseas enlazar?</label>
                <select id="type" onchange="updateFields()">
                    <option value="url">Enlace URL</option>
                    <option value="text">Texto plano</option>
                    <option value="phone">Llamada telefónica</option>
                    <option value="whatsapp">Mensaje de WhatsApp</option>
                    <option value="clipboard">Pegar del portapapeles</option>
                </select>
            </div>

            <div id="fields" class="form-group"></div>

            <div class="form-group">
                <label>Color del código</label>
                <input type="color" id="color" value="#000000">
            </div>

            <button id="btn-generate" class="btn-main" onclick="generateQR()">Generar Código QR</button>

            <div class="download-settings">
                <div>
                    <label>Tamaño</label>
                    <select id="downloadSize">
                        <option value="150">Carnet (150px)</option>
                        <option value="300" selected>Normal (300px)</option>
                        <option value="600">Grande (600px)</option>
                        <option value="1200">HD (1200px)</option>
                    </select>
                </div>
                <div>
                    <label>Formato</label>
                    <select id="downloadFormat">
                        <option value="png">PNG</option>
                        <option value="jpeg">JPG</option>
                        <option value="webp">WEBP</option>
                    </select>
                </div>
            </div>
            
            <button class="btn-download" onclick="downloadQR()">Descargar QR</button>
        </div>

        <div class="qr-wrapper">
            <div id="qrcode">
                <p class="placeholder-text">Tu QR aparecerá aquí</p>
            </div>
            <div id="preview"></div>
        </div>
    </div>
</div>

<footer>© 2026 QR PRO - Herramienta de código abierto</footer>

<script>
function updateFields() {
    let type = document.getElementById("type").value;
    let html = "";

    if (type === "url") {
        html = `<label>Ingresa la URL válida</label><input id="content" type="url" placeholder="https://ejemplo.com">`;
    } 
    else if (type === "phone" || type === "whatsapp") {
        html = `
        <label>Código de País</label>
        <select id="country" style="margin-bottom: 10px;" onchange="setLimit()">
            <option value="54" data-limit="10">Argentina (+54)</option>
            <option value="591" data-limit="8">Bolivia (+591)</option>
            <option value="55" data-limit="11">Brasil (+55)</option>
            <option value="56" data-limit="9">Chile (+56)</option>
            <option value="57" data-limit="10">Colombia (+57)</option>
            <option value="506" data-limit="8">Costa Rica (+506)</option>
            <option value="53" data-limit="8">Cuba (+53)</option>
            <option value="593" data-limit="9">Ecuador (+593)</option>
            <option value="503" data-limit="8">El Salvador (+503)</option>
            <option value="502" data-limit="8">Guatemala (+502)</option>
            <option value="504" data-limit="8">Honduras (+504)</option>
            <option value="52" data-limit="10">México (+52)</option>
            <option value="505" data-limit="8">Nicaragua (+505)</option>
            <option value="507" data-limit="8">Panamá (+507)</option>
            <option value="595" data-limit="9">Paraguay (+595)</option>
            <option value="51" data-limit="9" selected>Perú (+51)</option>
            <option value="1" data-limit="10">Puerto Rico / USA (+1)</option>
            <option value="1" data-limit="10">Rep. Dominicana (+1)</option>
            <option value="598" data-limit="8">Uruguay (+598)</option>
            <option value="58" data-limit="10">Venezuela (+58)</option>
        </select>
        <label>Número de teléfono</label>
        <input id="number" type="tel" placeholder="Ingresa el número" oninput="this.value = this.value.replace(/[^0-9]/g, '')">`;
    } 
    else if (type === "clipboard") {
        html = `<label>Pega tu contenido aquí</label><textarea id="content" rows="3" placeholder="Haz clic derecho y pega tu texto o enlace aquí..."></textarea>`;
    } 
    else {
        html = `<label>Escribe tu texto</label><input id="content" type="text" placeholder="Hola, este es mi QR...">`;
    }

    document.getElementById("fields").innerHTML = html;
    
    if (type === "phone" || type === "whatsapp") {
        setLimit();
    }
}

function setLimit() {
    let select = document.getElementById("country");
    let limit = select.options[select.selectedIndex].dataset.limit;
    document.getElementById("number").maxLength = limit;
}

function generateQR() {
    let type = document.getElementById("type").value;
    let color = document.getElementById("color").value;
    let data = "";

    if (type === "url") {
        let val = document.getElementById("content").value;
        if (!val) return alert("Por favor ingresa una URL");
        if (!val.startsWith("http")) val = "https://" + val;
        data = val;
    } else if (type === "phone" || type === "whatsapp") {
        let code = document.getElementById("country").value;
        let num = document.getElementById("number").value;
        if (!num) return alert("Por favor ingresa un número");
        if (type === "phone") data = "tel:+" + code + num;
        else data = "https://wa.me/" + code + num;
    } else {
        let val = document.getElementById("content").value;
        if (!val) return alert("El campo no puede estar vacío");
        data = val;
    }

    renderQR(data, color);
}

function renderQR(data, color) {
    let container = document.getElementById("qrcode");
    container.innerHTML = "";

    try {
        new QRCode(container, {
            text: data,
            width: 220,
            height: 220,
            colorDark: color,
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.L
        });
        document.getElementById("preview").innerText = data.length > 50 ? data.substring(0, 50) + "... (Data procesada)" : data;
    } catch (e) {
        alert("Ocurrió un error. El contenido sigue siendo demasiado extenso para un código QR.");
        container.innerHTML = '<p class="placeholder-text">Error al generar QR</p>';
    }
}

function downloadQR() {
    let canvas = document.querySelector("#qrcode canvas");
    let img = document.querySelector("#qrcode img");
    
    if (!canvas && !img) return alert("Genera un código QR primero");

    let source = canvas ? canvas : img;
    let size = parseInt(document.getElementById("downloadSize").value);
    let format = document.getElementById("downloadFormat").value;
    
    let newCanvas = document.createElement("canvas");
    newCanvas.width = size;
    newCanvas.height = size;
    let ctx = newCanvas.getContext("2d");
    
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, size, size);
    
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(source, 0, 0, size, size);

    let link = document.createElement("a");
    link.href = newCanvas.toDataURL("image/" + format);
    link.download = "mi-codigo-qr." + (format === "jpeg" ? "jpg" : format);
    link.click();
}

updateFields();
</script>

</body>
</html>
